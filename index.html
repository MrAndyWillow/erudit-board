    // --- SOUND ENGINE (Web Audio API) ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'click') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(700, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.08);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'tile') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(280, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(140, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.12);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.12);
        } else if (type === 'success') {
          const now = ctx.currentTime;
          [392, 523, 659, 784].forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.07);
            gain.gain.setValueAtTime(0.08, now + idx * 0.07);
            gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.07 + 0.12);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.07);
            osc.stop(now + idx * 0.07 + 0.12);
          });
        } else if (type === 'warning') {
          const now = ctx.currentTime;
          [160, 130].forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, now + idx * 0.15);
            gain.gain.setValueAtTime(0.12, now + idx * 0.15);
            gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.15 + 0.22);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.15);
            osc.stop(now + idx * 0.15 + 0.22);
          });
        } else if (type === 'block') {
          const now = ctx.currentTime;
          [494, 622].forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.09);
            gain.gain.setValueAtTime(0.12, now + idx * 0.09);
            gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.09 + 0.18);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.09);
            osc.stop(now + idx * 0.09 + 0.18);
          });
        }

    // --- COORD MULTIPLIERS GENERATION ---
    const getClassicMultipliers = () => {
      const multipliers = {};
      const parseLabel = (lbl) => {
        const col = lbl.charCodeAt(0) - 65; // A=0
        const row = parseInt(lbl.substring(1), 10) - 1;
        return { row, col };
      };
      
      const x3Word = ["A1", "H1", "O1", "A8", "O8", "A15", "H15", "O15"];
      const x3Letter = ["B2", "N2", "C3", "M3", "D4", "L4", "E5", "K5", "E11", "K11", "D12", "L12", "C13", "M13", "B14", "N14"];
      const x2Word = ["F2", "J2", "B6", "N6", "B10", "N10", "F14", "J14"];
      const x2Letter = ["D1", "L1", "G3", "I3", "A4", "H4", "O4", "C7", "G7", "I7", "M7", "D8", "L8", "C9", "G9", "I9", "M9", "A12", "H12", "O12", "G13", "I13", "D15", "L15"];

      x3Word.forEach(lbl => { const {row, col} = parseLabel(lbl); multipliers[`${row},${col}`] = 'x3_word'; });
      x3Letter.forEach(lbl => { const {row, col} = parseLabel(lbl); multipliers[`${row},${col}`] = 'x3_letter'; });
      x2Word.forEach(lbl => { const {row, col} = parseLabel(lbl); multipliers[`${row},${col}`] = 'x2_word'; });
      x2Letter.forEach(lbl => { const {row, col} = parseLabel(lbl); multipliers[`${row},${col}`] = 'x2_letter'; });
      return multipliers;
    };

    // Main App Component
    function App() {
      // --- STATE MANAGEMENT ---
      const [boardType, setBoardType] = useState('classic'); // 'classic' | 'alt'
      const [board, setBoard] = useState(() => Array(15).fill(null).map(() => Array(15).fill(null)));

      const [isLoadingDict, setIsLoadingDict] = useState(false);

      // UI State
      const [activeTab, setActiveTab] = useState('board'); // 'board' | 'analysis' | 'stats'
      const [selectedCell, setSelectedCell] = useState(null); // {r, c}
      const [hoveredSuggestion, setHoveredSuggestion] = useState(null); // Ghosted word
      const [isCalculating, setIsCalculating] = useState(false);
      const [suggestions, setSuggestions] = useState({ standard: [], tactical: [], jokerAssisted: [] });
      
      // Manual input state
      const [showManualModal, setShowManualModal] = useState(false);

      // Calculate state of remaining letter bag
      const bagStatus = useMemo(() => {

        for (let i = 0; i < upperRack.length; i++) {

      }, [board, rack, burnedTiles]);

      // Detect unique letters placed on board
      const boardLetters = useMemo(() => {
        const letters = new Set();
        for (let r = 0; r < 15; r++) {

      }, [board]);

      // Check if board is completely empty
      const isBoardEmpty = boardLetters.size === 0;

      // --- WORD SEARCH & TACTICAL ANALYSIS ALGORITHM ---
      const calculateBestMoves = () => {
        if (!rack.trim()) {

        setIsCalculating(true);
        setTimeout(() => {
          const startSearch = performance.now();
          const rackChars = rack.toUpperCase().split('');
          const candidates = [];

          // 1. Pre-filter words from dictionary that are physically possible
          // to build with rack letters + board letters + up to 3 extra jokers
          const boardLettersArray = Array.from(boardLetters);
          const rackLetterCounts = {};
          let rackJokers = 0;
          rackChars.forEach(char => {
            if (char === '*') rackJokers++;
            else rackLetterCounts[char] = (rackLetterCounts[char] || 0) + 1;
          });

          // Optimizing lookup by keeping a pre-filtered list
          const candidateWords = [];
          for (const word of dictionary) {
            if (word.length > 15) continue;
            
            let jokersNeeded = 0;
            const tempCounts = { ...rackLetterCounts };
            
            for (let i = 0; i < word.length; i++) {
              const char = word[i];
              if (tempCounts[char] && tempCounts[char] > 0) {
                tempCounts[char]--;
              } else if (boardLetters.has(char)) {
                // Letter exists somewhere on board, so word is potentially viable
              } else {
                jokersNeeded++;
              }
            }

            // Max extra jokers we would allow a player to buy is 3
            if (jokersNeeded <= rackJokers + 3) {
              candidateWords.push({ word, baseJokersNeeded: jokersNeeded });
            }
          }

          // 2. Exhaustive board scanning
          const foundPlays = [];

          // Helper to trace vertical crossword
          const getVerticalCrossword = (row, col, newChar) => {
            let startRow = row;
            while (startRow > 0 && board[startRow - 1][col]) {
              startRow--;
            }
            let endRow = row;
            while (endRow < 14 && board[endRow + 1][col]) {
              endRow++;
            }
            if (startRow === endRow) return null; // No crossword, just our single tile

            let fullWord = '';
            for (let r = startRow; r <= endRow; r++) {
              fullWord += r === row ? newChar : board[r][col];
            }
            return { word: fullWord, startRow, endRow };
          };

          // Helper to trace horizontal crossword
          const getHorizontalCrossword = (row, col, newChar) => {
            let startCol = col;
            while (startCol > 0 && board[row][startCol - 1]) {
              startCol--;
            }
            let endCol = col;
            while (endCol < 14 && board[row][endCol + 1]) {
              endCol++;
            }
            if (startCol === endCol) return null;

            let fullWord = '';
            for (let c = startCol; c <= endCol; c++) {
              fullWord += c === col ? newChar : board[row][c];
            }
            return { word: fullWord, startCol, endCol };
          };

          // Evaluate horizontal placement
          const checkHorizontalPlacement = (word, r, c) => {
            const L = word.length;
            if (c + L > 15) return;

            // Strict boundary check: cell left and cell right must be empty
            if (c > 0 && board[r][c - 1]) return;
            if (c + L < 15 && board[r][c + L]) return;

            let intersects = false;
            let newlyPlaced = 0;
            const usedRackTiles = [];
            const placementJokers = [];
            let tempRack = [...rackChars];

            for (let i = 0; i < L; i++) {
              const col = c + i;
              const boardTile = board[r][col];
              const targetChar = word[i];

              if (boardTile) {
                if (boardTile !== targetChar) return; // Mismatch
                intersects = true;
              } else {
                // Check if adjacent to other tiles (touching anchor)
                if (
                  (r > 0 && board[r - 1][col]) ||
                  (r < 14 && board[r + 1][col])
                ) {
                  intersects = true;
                }

                // Consume letter from rack
                const idx = tempRack.indexOf(targetChar);
                if (idx !== -1) {
                  tempRack.splice(idx, 1);
                  usedRackTiles.push(targetChar);
                } else {
                  // Try to use a wildcard '*'
                  const starIdx = tempRack.indexOf('*');
                  if (starIdx !== -1) {
                    tempRack.splice(starIdx, 1);
                    usedRackTiles.push('*');
                    placementJokers.push({ index: i, char: targetChar });
                  } else {
                    // Requires buying a joker
                    usedRackTiles.push('💎'); // Mark as bought
                    placementJokers.push({ index: i, char: targetChar, bought: true });
                  }
                }
                newlyPlaced++;
              }
            }

            // Empty board constraint: must cross H8 (7,7)
            if (isBoardEmpty) {
              const coversCenter = r === 7 && c <= 7 && c + L - 1 >= 7;
              if (!coversCenter) return;
              intersects = true;
            }

            if (!intersects || newlyPlaced === 0) return;

            // Verify all newly formed vertical crosswords are valid
            const crosswords = [];
            for (let i = 0; i < L; i++) {
              const col = c + i;
              if (!board[r][col]) {
                const cross = getVerticalCrossword(r, col, word[i]);
                if (cross) {
                  if (!dictionarySet.has(cross.word)) return; // Invalid word!
                  crosswords.push({ ...cross, col });
                }
              }
            }

            // Total jokers needed
            const jokersNeeded = placementJokers.length;

            // --- CALCULATE SCORE ---
            let wordMultiplierSum = 0;
            let baseWordScore = 0;
            let crosswordScoresTotal = 0;

            for (let i = 0; i < L; i++) {
              const col = c + i;
              const isNew = !board[r][col];
              const char = word[i];
              const isJoker = placementJokers.some(pj => pj.index === i);
              const letterValue = isJoker ? 0 : LETTER_VALUES[char] || 0;

              if (isNew) {
                const mult = activeMultipliers[`${r},${col}`];
                let lMult = 1;
                if (mult === 'x2_letter') lMult = 2;
                if (mult === 'x3_letter') lMult = 3;
                if (mult === 'x2_word') wordMultiplierSum += 2;
                if (mult === 'x3_word') wordMultiplierSum += 3;

                const tileScore = letterValue * lMult;
                baseWordScore += tileScore;
              } else {
                baseWordScore += letterValue;
              }
            }

            const wordMultiplier = wordMultiplierSum > 0 ? wordMultiplierSum : 1;
            let finalWordScore = baseWordScore * wordMultiplier;

            // Add crossword scores
            crosswords.forEach(cross => {
              let crossBase = 0;
              let crossMultSum = 0;

              for (let cr = cross.startRow; cr <= cross.endRow; cr++) {
                const isNew = cr === r;
                const char = cross.word[cr - cross.startRow];
                const isJoker = isNew && placementJokers.some(pj => pj.index === (cross.col - c));
                const letterValue = isJoker ? 0 : LETTER_VALUES[char] || 0;

                if (isNew) {
                  const mult = activeMultipliers[`${cr},${cross.col}`];
                  let lMult = 1;
                  if (mult === 'x2_letter') lMult = 2;
                  if (mult === 'x3_letter') lMult = 3;
                  if (mult === 'x2_word') crossMultSum += 2;
                  if (mult === 'x3_word') crossMultSum += 3;
                  crossBase += letterValue * lMult;
                } else {
                  crossBase += letterValue;
                }
              }
              const crossMult = crossMultSum > 0 ? crossMultSum : 1;
              crosswordScoresTotal += crossBase * crossMult;
            });

            let finalMoveScore = finalWordScore + crosswordScoresTotal;
            if (newlyPlaced === 7) finalMoveScore += 15; // 7-letter bonus

            // --- TACTICAL METRICS ---
            let sortScore = finalMoveScore;
            const defenseAlerts = [];
            const strategicBlocks = [];

            // 1. Extension Risk Assessment (Can opponent build onto it?)
            const extensions = dictionary.filter(w => w.length > word.length && w.includes(word));
            let maxOpponentExtensionValue = 0;
            let dangerousExtension = null;

            extensions.forEach(ext => {
              const idx = ext.indexOf(word);
              const prependLen = idx;
              const appendLen = ext.length - word.length - idx;

              // Check if space exists on the board to complete this extension
              const prependOk = prependLen === 0 || (c - prependLen >= 0 && Array(prependLen).fill(0).every((_, k) => !board[r][c - 1 - k]));
              const appendOk = appendLen === 0 || (c + L + appendLen <= 15 && Array(appendLen).fill(0).every((_, k) => !board[r][c + L + k]));

              if (prependOk && appendOk) {
                // Estimate potential opponent score for doing this extension
                let estVal = ext.split('').reduce((acc, ch) => acc + (LETTER_VALUES[ch] || 0), 0);
                if (estVal > maxOpponentExtensionValue) {
                  maxOpponentExtensionValue = estVal;
                  dangerousExtension = ext;
                }
              }
            });

            if (maxOpponentExtensionValue > 15) {
              sortScore -= (maxOpponentExtensionValue * 0.4); // Rating Penalty
              defenseAlerts.push(`Риск достройки до "${dangerousExtension}" (+${maxOpponentExtensionValue} очков сопернику)`);
            }

            // 2. Corner Strategy Block Check (A1, A15, O1, O15)
            const corners = [[0,0], [0,14], [14,0], [14,14]];
            const cornerBlockers = ['Ь', 'Ъ', 'Ы', 'Й', 'Ц', 'Щ', 'Ф', 'Ч', 'Ю', 'Ж', 'Ш', 'З'];
            const easyVowels = ['А', 'О', 'Е', 'И', 'Н'];

            for (let i = 0; i < L; i++) {
              const col = c + i;
              const isCorner = corners.some(([cr, cc]) => cr === r && cc === col);
              if (isCorner && !board[r][col]) {
                const char = word[i];
                if (cornerBlockers.includes(char)) {
                  sortScore += 25; // Bonus
                  strategicBlocks.push(`🛡️ Угловой блок: "${char}" надежно перекрывает доступ к x3 слово`);
                } else if (easyVowels.includes(char)) {
                  sortScore -= 30; // Strong penalty
                  defenseAlerts.push(`⚠️ Риск: гласная "${char}" в углу открывает сопернику путь к x3 слово`);
                }
              }
            }

            foundPlays.push({
              word,
              row: r,
              col: c,
              dir: 'H',
              score: finalMoveScore,
              jokersNeeded,
              placementJokers,
              sortScore,
              defenseAlerts,
              strategicBlocks,
              newLettersCount: newlyPlaced
            });
          };

          // Evaluate vertical placement (transpose logic)
          const checkVerticalPlacement = (word, r, c) => {
            const L = word.length;
            if (r + L > 15) return;

            // Boundary checks
            if (r > 0 && board[r - 1][c]) return;
            if (r + L < 15 && board[r + L][c]) return;

            let intersects = false;
            let newlyPlaced = 0;
            const usedRackTiles = [];
            const placementJokers = [];
            let tempRack = [...rackChars];

            for (let i = 0; i < L; i++) {
              const row = r + i;
              const boardTile = board[row][c];
              const targetChar = word[i];

              if (boardTile) {
                if (boardTile !== targetChar) return;
                intersects = true;
              } else {
                if (
                  (c > 0 && board[row][c - 1]) ||
                  (c < 14 && board[row][c + 1])
                ) {
                  intersects = true;
                }

                const idx = tempRack.indexOf(targetChar);
                if (idx !== -1) {
                  tempRack.splice(idx, 1);
                  usedRackTiles.push(targetChar);
                } else {
                  const starIdx = tempRack.indexOf('*');
                  if (starIdx !== -1) {
                    tempRack.splice(starIdx, 1);
                    usedRackTiles.push('*');
                    placementJokers.push({ index: i, char: targetChar });
                  } else {
                    usedRackTiles.push('💎');
                    placementJokers.push({ index: i, char: targetChar, bought: true });
                  }
                }
                newlyPlaced++;
              }
            }

            if (isBoardEmpty) {
              const coversCenter = c === 7 && r <= 7 && r + L - 1 >= 7;
              if (!coversCenter) return;
              intersects = true;
            }

            if (!intersects || newlyPlaced === 0) return;

            // Verify horizontal crosswords are valid
            const crosswords = [];
            for (let i = 0; i < L; i++) {
              const row = r + i;
              if (!board[row][c]) {
                const cross = getHorizontalCrossword(row, c, word[i]);
                if (cross) {
                  if (!dictionarySet.has(cross.word)) return;
                  crosswords.push({ ...cross, row });
                }
              }
            }

            const jokersNeeded = placementJokers.length;

            // Score vertical placement
            let wordMultiplierSum = 0;
            let baseWordScore = 0;
            let crosswordScoresTotal = 0;

            for (let i = 0; i < L; i++) {
              const row = r + i;
              const isNew = !board[row][c];
              const char = word[i];
              const isJoker = placementJokers.some(pj => pj.index === i);
              const letterValue = isJoker ? 0 : LETTER_VALUES[char] || 0;

              if (isNew) {
                const mult = activeMultipliers[`${row},${c}`];
                let lMult = 1;
                if (mult === 'x2_letter') lMult = 2;
                if (mult === 'x3_letter') lMult = 3;
                if (mult === 'x2_word') wordMultiplierSum += 2;
                if (mult === 'x3_word') wordMultiplierSum += 3;

                const tileScore = letterValue * lMult;
                baseWordScore += tileScore;
              } else {
                baseWordScore += letterValue;
              }
            }

            const wordMultiplier = wordMultiplierSum > 0 ? wordMultiplierSum : 1;
            let finalWordScore = baseWordScore * wordMultiplier;

            crosswords.forEach(cross => {
              let crossBase = 0;
              let crossMultSum = 0;

              for (let cc = cross.startCol; cc <= cross.endCol; cc++) {
                const isNew = cc === c;
                const char = cross.word[cc - cross.startCol];
                const isJoker = isNew && placementJokers.some(pj => pj.index === (cross.row - r));
                const letterValue = isJoker ? 0 : LETTER_VALUES[char] || 0;

                if (isNew) {
                  const mult = activeMultipliers[`${cross.row},${cc}`];
                  let lMult = 1;
                  if (mult === 'x2_letter') lMult = 2;
                  if (mult === 'x3_letter') lMult = 3;
                  if (mult === 'x2_word') crossMultSum += 2;
                  if (mult === 'x3_word') crossMultSum += 3;
                  crossBase += letterValue * lMult;
                } else {
                  crossBase += letterValue;
                }
              }
              const crossMult = crossMultSum > 0 ? crossMultSum : 1;
              crosswordScoresTotal += crossBase * crossMult;
            });

            let finalMoveScore = finalWordScore + crosswordScoresTotal;
            if (newlyPlaced === 7) finalMoveScore += 15;

            // Tactical analysis
            let sortScore = finalMoveScore;
            const defenseAlerts = [];
            const strategicBlocks = [];

            // Extension Risk
            const extensions = dictionary.filter(w => w.length > word.length && w.includes(word));
            let maxOpponentExtensionValue = 0;
            let dangerousExtension = null;

            extensions.forEach(ext => {
              const idx = ext.indexOf(word);
              const prependLen = idx;
              const appendLen = ext.length - word.length - idx;

              const prependOk = prependLen === 0 || (r - prependLen >= 0 && Array(prependLen).fill(0).every((_, k) => !board[r - 1 - k][c]));
              const appendOk = appendLen === 0 || (r + L + appendLen <= 15 && Array(appendLen).fill(0).every((_, k) => !board[r + L + k][c]));

              if (prependOk && appendOk) {
                let estVal = ext.split('').reduce((acc, ch) => acc + (LETTER_VALUES[ch] || 0), 0);
                if (estVal > maxOpponentExtensionValue) {
                  maxOpponentExtensionValue = estVal;
                  dangerousExtension = ext;
                }
              }
            });

            if (maxOpponentExtensionValue > 15) {
              sortScore -= (maxOpponentExtensionValue * 0.4);
              defenseAlerts.push(`Риск достройки до "${dangerousExtension}" (+${maxOpponentExtensionValue} очков сопернику)`);
            }

            // Corners Strategic Block Check
            const corners = [[0,0], [0,14], [14,0], [14,14]];
            const cornerBlockers = ['Ь', 'Ъ', 'Ы', 'Й', 'Ц', 'Щ', 'Ф', 'Ч', 'Ю', 'Ж', 'Ш', 'З'];
            const easyVowels = ['А', 'О', 'Е', 'И', 'Н'];

            for (let i = 0; i < L; i++) {
              const row = r + i;
              const isCorner = corners.some(([cr, cc]) => cr === row && cc === c);
              if (isCorner && !board[row][c]) {
                const char = word[i];
                if (cornerBlockers.includes(char)) {
                  sortScore += 25;
                  strategicBlocks.push(`🛡️ Угловой блок: "${char}" надежно перекрывает доступ к x3 слово`);
                } else if (easyVowels.includes(char)) {
                  sortScore -= 30;
                  defenseAlerts.push(`⚠️ Риск: гласная "${char}" в углу открывает сопернику путь к x3 слово`);
                }
              }
            }

            foundPlays.push({
              word,
              row: r,
              col: c,
              dir: 'V',
              score: finalMoveScore,
              jokersNeeded,
              placementJokers,
              sortScore,
              defenseAlerts,
              strategicBlocks,
              newLettersCount: newlyPlaced
            });
          };

          // Run checks across candidates
          candidateWords.forEach(({ word }) => {
            for (let r = 0; r < 15; r++) {
              for (let c = 0; c < 15; c++) {
                checkHorizontalPlacement(word, r, c);
                checkVerticalPlacement(word, r, c);
              }
            }
          });

          // Sort and segment results
          const rackJokerCount = rackChars.filter(c => c === '*').length;

          // Categorize Suggestions
          const standard = foundPlays
            .filter(p => p.jokersNeeded <= rackJokerCount)
            .sort((a, b) => b.score - a.score)
            .slice(0, 15);

          const tactical = foundPlays
            .filter(p => p.jokersNeeded <= rackJokerCount)
            .sort((a, b) => b.sortScore - a.sortScore)
            .slice(0, 15);

          const jokerAssisted = foundPlays
            .filter(p => p.jokersNeeded > rackJokerCount)
            .sort((a, b) => b.score - a.score)
            .slice(0, 15);

          setSuggestions({ standard, tactical, jokerAssisted });
          setIsCalculating(false);
          setActiveTab('analysis');
          playSound('success');
          console.log(`Calculated in ${(performance.now() - startSearch).toFixed(1)}ms. Matches found: ${foundPlays.length}`);
        }, 50);
      };

      // --- PERSIST MOVE ON BOARD ---
      const applyMove = (play) => {
        playSound('tile');
        const newBoard = board.map(row => [...row]);
        const L = play.word.length;

        // Save state in history for Undo
        setHistory(prev => [...prev, {
          board: board.map(row => [...row]),
          rack,
          burnedTiles: { ...burnedTiles }
        }]);

        // Place on board
        const newlyPlacedLetters = [];
        for (let i = 0; i < L; i++) {
          const row = play.dir === 'H' ? play.row : play.row + i;
          const col = play.dir === 'H' ? play.col + i : play.col;
          if (!newBoard[row][col]) {
            newBoard[row][col] = play.word[i];
            newlyPlacedLetters.push(play.word[i]);
          }
        }

        setBoard(newBoard);

        // Consume letters from hand
        let tempRack = rack.toUpperCase().split('');
        const unusedBurned = { ...burnedTiles };

        play.placementJokers.forEach(pj => {
          if (pj.bought) {
            // Need to burn a letter from hands to pay for extra joker
            // Let's choose a heavy or unused letter automatically
            const availableToBurn = tempRack.filter(c => c !== '*');
            if (availableToBurn.length > 0) {
              const burnTarget = availableToBurn[0];
              const bIdx = tempRack.indexOf(burnTarget);
              if (bIdx !== -1) {
                tempRack.splice(bIdx, 1);
                unusedBurned[burnTarget] = (unusedBurned[burnTarget] || 0) + 1;
              }
            }
          } else {
            // Regular joker consumption
            const sIdx = tempRack.indexOf('*');
            if (sIdx !== -1) tempRack.splice(sIdx, 1);
          }
        });

        // Consume normal letters
        play.word.split('').forEach((char, idx) => {
          const row = play.dir === 'H' ? play.row : play.row + idx;
          const col = play.dir === 'H' ? play.col + idx : play.col;
          const isNew = !board[row][col];
          const isJoker = play.placementJokers.some(pj => pj.index === idx);

          if (isNew && !isJoker) {
            const rIdx = tempRack.indexOf(char);
            if (rIdx !== -1) {
              tempRack.splice(rIdx, 1);
            }
          }
        });

        setBurnedTiles(unusedBurned);
        setHoveredSuggestion(null);
        setSelectedCell(null);
        setActiveTab('board');
        playSound('success');

                      <svg class="w-12 h-12 text-zinc-700 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 .364l-.707 .707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548 .547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                      <p class="text-xs font-semibold">Готов к анализу</p>
                      <p class="text-[10px] text-zinc-600">Впишите буквы на руках и нажмите «Поиск» для запуска ИИ</p>
                    </div>
                  )}

                  {/* Standard Moves category list */}
                  {suggestions.standard.map((play, index) => (
                    <div 
                      key={`play-std-${index}`}
                      onMouseEnter={() => setHoveredSuggestion(play)}
                      onMouseLeave={() => setHoveredSuggestion(null)}
                      class="bg-zinc-950 p-3 rounded-xl border border-zinc-800/80 hover:border-brand-500/40 transition relative flex justify-between items-center group"
                    >
                      <div class="flex flex-col gap-1">
                        
                        <div class="flex items-center gap-2">
                          <span class="font-extrabold text-base tracking-wide text-white">{play.word}</span>
                          <span class="text-[10px] font-bold text-zinc-400 bg-zinc-900 px-2 py-0.5 rounded border border-zinc-800">
                            {getCoordLabel(play.row, play.col)} {play.dir === 'H' ? '→' : '↓'}
                          </span>
                        </div>

                        <div class="text-[10px] text-zinc-500 flex flex-wrap gap-x-2 gap-y-1">
                          <span>Фишек: {play.newLettersCount}</span>
                          {play.newLettersCount === 7 && <span class="text-emerald-400 font-bold">🎉 Бонус +15</span>}
                        </div>

                        {/* Tactical Alerts inside cards */}
                        {play.defenseAlerts.length > 0 && (
                          <div class="mt-1 flex flex-col gap-0.5">
                            {play.defenseAlerts.map((alt, ai) => (
                              <span key={ai} class="text-[9px] text-red-400 flex items-center gap-1">
                                ⚠️ {alt}
                              </span>
                            ))}
                          </div>
                        )}

                        {play.strategicBlocks.length > 0 && (
                          <div class="mt-1 flex flex-col gap-0.5">
                            {play.strategicBlocks.map((blk, bi) => (
                              <span key={bi} class="text-[9px] text-emerald-400 flex items-center gap-1">
                                {blk}
                              </span>
                            ))}
                          </div>
                        )}

                      </div>

                      <div class="flex flex-col items-end gap-2">
                        <div class="text-right">
                          <span class="text-xs text-zinc-500 font-medium">очков</span>
                          <p class="text-2xl font-black text-brand-500 leading-none">+{play.score}</p>
                        </div>

                        <button 
                          onClick={() => applyMove(play)}
                          class="bg-zinc-900 group-hover:bg-brand-500 group-hover:text-zinc-950 border border-zinc-800 group-hover:border-brand-500 text-zinc-300 px-2.5 py-1 rounded-lg text-[10px] font-bold transition flex items-center gap-1"
                        >
                          Применить
                        </button>
                      </div>

                    </div>
                  ))}

                  {/* Joker Assisted Moves category list */}
                  {suggestions.jokerAssisted.length > 0 && (
                    <div class="mt-4 border-t border-zinc-800/80 pt-3">
                      <div class="flex justify-between items-center mb-2 px-1">
                        <span class="text-[11px] font-bold uppercase tracking-wider text-amber-400 flex items-center gap-1">
                          💎 Требуется докупить джокеров
                        </span>
                        <span class="text-[9px] text-zinc-500">Сжигайте лишнее для активации джокеров</span>
                      </div>

                      {suggestions.jokerAssisted.map((play, index) => (
                        <div 
                          key={`play-jok-${index}`}
                          onMouseEnter={() => setHoveredSuggestion(play)}
                          onMouseLeave={() => setHoveredSuggestion(null)}
                          class="bg-zinc-950/60 p-3 rounded-xl border border-amber-900/20 hover:border-amber-500/30 transition relative flex justify-between items-center group"
                        >
                          <div class="flex flex-col gap-1">
                            
                            <div class="flex items-center gap-2">
                              <span class="font-extrabold text-base tracking-wide text-zinc-300">{play.word}</span>
                              <span class="text-[10px] font-bold text-amber-500 bg-amber-950/20 px-2 py-0.5 rounded border border-amber-900/30">
                                {getCoordLabel(play.row, play.col)} {play.dir === 'H' ? '→' : '↓'}
                              </span>
                            </div>

                            <div class="text-[10px] text-zinc-500 flex flex-wrap gap-x-2 gap-y-1">
                              <span class="text-amber-400/80 font-semibold">💎 Требуется джокеров: {play.jokersNeeded}</span>
                              <span>Новых букв: {play.newLettersCount}</span>
                            </div>

                            {/* Tactical Corner blocks / vowel warnings on Joker plays */}
                            {play.defenseAlerts.length > 0 && (
                              <div class="mt-1 flex flex-col gap-0.5">
                                {play.defenseAlerts.map((alt, ai) => (
                                  <span key={ai} class="text-[9px] text-red-400">⚠️ {alt}</span>
                                ))}
                              </div>
                            )}

                          </div>

                          <div class="flex flex-col items-end gap-2">
                            <div class="text-right">
                              <span class="text-[10px] text-zinc-500">очков</span>
                              <p class="text-xl font-bold text-amber-500 leading-none">+{play.score}</p>
                            </div>

                            <button 
                              onClick={() => {
                                if (confirm(`Для этого хода вам потребуется джокеров: ${play.jokersNeeded}. Выкупить джокеры и выложить слово на поле?`)) {
                                  applyMove(play);
                                }
                              }}
                              class="bg-amber-950/20 hover:bg-amber-500 hover:text-zinc-950 border border-amber-900/40 hover:border-amber-500 text-amber-400 px-2.5 py-1 rounded-lg text-[10px] font-bold transition flex items-center gap-1"
                            >
                              Применить
                            </button>
                          </div>

                        </div>
                      ))}
                    </div>
                  )}

                </div>

              </div>

              {/* --- REAL-TIME BAG STATUS AND PROBABILITY ANALYSIS --- */}
              <div class={`bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-lg flex flex-col gap-4 ${activeTab === 'stats' ? 'block' : 'hidden lg:block'}`}>
                
                <div class="flex justify-between items-center border-b border-zinc-800 pb-3">
                  <h3 class="text-sm font-bold uppercase tracking-wider text-zinc-400 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded bg-amber-500"></span>
                    Остаток Букв в Мешке
                  </h3>
                  <span class="text-xs font-semibold text-zinc-300 bg-zinc-950 px-2.5 py-1 rounded-lg">
                    Осталось: <span class="text-amber-400 font-bold">{bagStatus.total}</span> из 108 шт
                  </span>
                </div>

                {/* Live Probability distribution matrix */}
                <div class="grid grid-cols-6 sm:grid-cols-9 gap-1.5 max-h-[180px] overflow-y-auto pr-1">
                  {Object.entries(bagStatus.counts)
                    .sort((a, b) => b[1] - a[1]) // Sort remaining letters descending
                    .map(([char, count]) => {
                      const isZero = count === 0;
                      const initialCount = INITIAL_BAG[char] || 1;
                      const percentage = Math.round((count / bagStatus.total) * 100);
                      
                      return (
                        <div 
                          key={`bag-item-${char}`}
                          class={`p-1.5 rounded-lg border flex flex-col items-center justify-between transition-all ${isZero ? 'bg-zinc-950/40 border-zinc-900/80 opacity-30 text-zinc-600' : 'bg-zinc-950 border-zinc-800/80 hover:border-zinc-700 text-zinc-200'}`}
                        >
                          <span class="text-xs font-extrabold leading-none">{char === '*' ? '★' : char}</span>
                          <div class="w-full text-center mt-1">
                            <span class="text-[11px] font-black block leading-none">{count}</span>
                            <span class="text-[7px] text-zinc-500 font-semibold block leading-none mt-0.5">
                              {!isZero ? `${percentage}%` : 'нет'}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                </div>

                {/* Burned tiles recovery information */}
                {Object.keys(burnedTiles).length > 0 && (
                  <div class="p-3 bg-red-950/20 border border-red-900/30 rounded-xl flex flex-col gap-1.5">
                    <p class="text-[11px] text-red-400 font-bold uppercase tracking-wider">
                      🔥 Сожженные фишки в этой партии:
                    </p>
                    <div class="flex flex-wrap gap-1.5">
                      {Object.entries(burnedTiles).map(([char, count]) => (
                        <span key={char} class="text-xs font-bold text-zinc-100 bg-red-900/40 border border-red-800/40 px-2 py-0.5 rounded">
                          {char}: {count} шт
                        </span>
                      ))}
                    </div>
                  </div>
                )}

              </div>

            </section>

          </main>

          {/* --- MANUAL PLACEMENT MODAL DIALOG (Add Word wizard) --- */}
          {showManualModal && (
            <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div class="bg-zinc-900 w-full max-w-md rounded-2xl border border-zinc-800 overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-150">
                
                <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                  <h3 class="font-bold text-zinc-100 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded bg-brand-500"></span>
                    Запись Хода Вручную
                  </h3>
                  <button 
                    onClick={() => { playSound('click'); setShowManualModal(false); }}
                    class="text-zinc-500 hover:text-zinc-300"
                  >
                    ✕
                  </button>
                </div>

                <div class="p-5 flex flex-col gap-4">
                  
                  {/* Word Input */}
                  <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-zinc-400 uppercase">Слово</label>
                    <input 
                      type="text" 
                      value={manualWord}
                      onChange={(e) => setManualWord(e.target.value)}
                      placeholder="Впишите сыгранное слово"
                      class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-100 font-bold focus:outline-none focus:ring-2 focus:ring-brand-500 uppercase tracking-wider"
                    />
                  </div>

                  {/* Row & Col selection */}
                  <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1">
                      <label class="text-xs font-bold text-zinc-400 uppercase">Строка (1-15)</label>
                      <select 
                        value={manualRow}
                        onChange={(e) => setManualRow(parseInt(e.target.value, 10))}
                        class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-100 font-bold focus:outline-none"
                      >
                        {Array(15).fill(0).map((_, i) => (
                          <option key={i} value={i}>{i + 1}</option>
                        ))}
                      </select>
                    </div>

                    <div class="flex flex-col gap-1">
                      <label class="text-xs font-bold text-zinc-400 uppercase">Столбец (A-O)</label>
                      <select 
                        value={manualCol}
                        onChange={(e) => setManualCol(parseInt(e.target.value, 10))}
                        class="bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-100 font-bold focus:outline-none"
                      >
                        {Array(15).fill(0).map((_, i) => (
                          <option key={i} value={i}>{String.fromCharCode(65 + i)}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* Direction */}
                  <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-zinc-400 uppercase">Направление</label>
                    <div class="grid grid-cols-2 gap-2">
                      <button 
                        onClick={() => { playSound('click'); setManualDir('H'); }}
                        class={`py-2.5 font-bold rounded-xl border text-xs ${manualDir === 'H' ? 'bg-brand-500 border-brand-500 text-zinc-950' : 'bg-zinc-950 border-zinc-800 text-zinc-400'}`}
                      >
                        Горизонтально (→)
                      </button>
                      <button 
                        onClick={() => { playSound('click'); setManualDir('V'); }}
                        class={`py-2.5 font-bold rounded-xl border text-xs ${manualDir === 'V' ? 'bg-brand-500 border-brand-500 text-zinc-950' : 'bg-zinc-950 border-zinc-800 text-zinc-400'}`}
                      >
                        Вертикально (↓)
                      </button>
                    </div>
                  </div>

                  {/* Performer */}
                  <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-zinc-400 uppercase">Исполнитель</label>
                    <div class="grid grid-cols-2 gap-2">
                      <button 
                        onClick={() => { playSound('click'); setManualPlayer('Соперник'); }}
                        class={`py-2.5 font-bold rounded-xl border text-xs ${manualPlayer === 'Соперник' ? 'bg-zinc-800 border-zinc-700 text-white' : 'bg-zinc-950 border-zinc-800 text-zinc-500'}`}
                      >
                        😈 Соперник
                      </button>
                      <button 
                        onClick={() => { playSound('click'); setManualPlayer('Игрок'); }}
                        class={`py-2.5 font-bold rounded-xl border text-xs ${manualPlayer === 'Игрок' ? 'bg-brand-500 border-brand-500 text-zinc-950' : 'bg-zinc-950 border-zinc-800 text-zinc-500'}`}
                      >
                        😊 Я сам (Игрок)
                      </button>
                    </div>
                  </div>

                </div>

                {/* Footer with action buttons */}
                <div class="p-4 border-t border-zinc-800 bg-zinc-950/40 flex justify-end gap-2">
                  <button 
                    onClick={() => { playSound('click'); setShowManualModal(false); }}
                    class="bg-zinc-800 hover:bg-zinc-750 text-zinc-300 font-bold text-xs py-2 px-4 rounded-lg border border-zinc-700 transition"
                  >
                    Отмена
                  </button>
                  <button 
                    onClick={submitManualMove}
                    class="bg-brand-500 hover:bg-brand-600 text-zinc-950 font-extrabold text-xs py-2 px-5 rounded-lg border border-brand-500 transition shadow-md shadow-brand-500/10"
                  >
                    Применить Ход
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* --- FOOTER BRAGGING --- */}
          <footer class="border-t border-zinc-800 bg-zinc-900/30 px-4 py-4 text-center text-xs text-zinc-500">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
              <p>© 2026 Эрудит Помощник Pro. Разработано с использованием React, Tailwind CSS и ИИ.</p>
              <div class="flex gap-4">
                <a href="#" class="hover:text-zinc-300 transition">GitHub репозиторий</a>
                <span class="text-zinc-700">|</span>
                <span class="text-zinc-400">Версия 1.4.0 (PWA Ready)</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Render React Dom
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
